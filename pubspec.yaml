name: mexc_demo_trader
description: "Демо-трейдинг крипто с реальными котировками MEXC (виртуальный баланс)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Сеть
  http: ^1.2.1
  web_socket_channel: ^3.0.3
  crypto: ^3.0.3 # HMAC SHA256 подпись запросов к MEXC

  # Графики (свечи + линии) и TradingView WebView
  fl_chart: ^0.68.0
  webview_flutter: ^4.8.0

  # Безопасное хранилище API-ключей (Android Keystore / iOS Keychain)
  flutter_secure_storage: ^9.2.2

  # Локальное хранилище (баланс, позиции, история, настройки, пресеты)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Фоновые задачи и уведомления
  flutter_local_notifications: ^17.2.2
  workmanager: ^0.5.2

  # Сохранение/шаринг изображений графика
  share_plus: ^10.0.0
  path_provider: ^2.1.4

  # Утилиты
  intl: ^0.19.0
  provider: ^6.1.2
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
